name: SymairaHub
options:
  bundleIdPrefix: dev.symaira
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  SymairaAppKit:
    url: https://github.com/danieljustus/symaira-appkit
    exactVersion: 0.2.0
  # DEV-STAGE path dependency (Module Integration Contract): scope's
  # feature package lives in a repo subdirectory, which SPM cannot pin by
  # tag. Before the hub gets CI/releases, scope needs a root-level package
  # or a dedicated tagging scheme.
  # Symlinked under Modules/ with unique names: SPM derives package
  # identity from the directory basename, and every tool repo calls its
  # package dir "client" — two raw ../<repo>/client paths collide.
  SymscopeClient:
    path: Modules/symscope-client
  SymseekClient:
    path: Modules/symseek-client

targets:
  SymairaHub:
    type: application
    platform: macOS
    deploymentTarget:
      macOS: "14.0"
    dependencies:
      - package: SymairaAppKit
        product: SymairaTheme
      - package: SymairaAppKit
        product: SymairaToolKit
      - package: SymairaAppKit
        product: SymairaUpdateCheck
      - package: SymscopeClient
        product: SymscopeFeature
      - package: SymseekClient
        product: SymseekFeature
    sources:
      - path: Sources/HubApp
    entitlements:
      path: SymairaHub.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.symaira.SymairaHub
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        GENERATE_INFOPLIST_FILE: YES
